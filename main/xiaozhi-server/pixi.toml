[workspace]
authors = ["etnAtker <adsonlies@hotmail.com>"]
channels = ["conda-forge"]
name = "xiaozhi-server"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]
start = "python app.py"
performance-tester = "python performance_tester.py"

[dependencies]
python = "3.10.*"
ffmpeg = ">=8.0.1,<9"
libopus = ">=1.6.1,<2"
libiconv = ">=1.18,<2"

[pypi-dependencies]
aiohttp = "==3.13.2"
"aiohttp-cors" = "==0.8.1"
