dashscope = "==1.25.2"
"edge-tts" = "==7.2.6"
funasr = "==1.2.7"
"google-generativeai" = "==0.8.5"
httpx = "==0.28.1"
jinja2 = "==3.1.6"
loguru = "==0.7.3"
markitdown = "==0.1.3"
mcp = "==1.22.0"
"mcp-proxy" = "==0.10.0"
mem0ai = "==1.0.0"
modelscope = "==1.32.0"
numpy = "==1.26.4"
"opuslib-next" = "==1.1.5"
